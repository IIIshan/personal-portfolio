name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare SSH key
        shell: bash
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ssh_key
          chmod 600 ssh_key

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: ssh_key
          script: |
            set -e
            
            # Navigate to project directory
            cd ~/Personal_Portfolio || mkdir -p ~/Personal_Portfolio
            
            # Clone or pull latest code
            if [ -d .git ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} .
            fi
            
            # Build Docker image locally
            docker build -t portfolio-web:latest .
            
            # Stop and remove old container
            docker stop portfolio-web 2>/dev/null || true
            docker rm portfolio-web 2>/dev/null || true
            
            # Run new container (preserving volumes)
            docker run -d \
              --name portfolio-web \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              -v caddy_data:/data \
              -v caddy_config:/config \
              portfolio-web:latest
            
            # Clean up old images
            docker image prune -f || true
            
            echo "Deployment complete!"
