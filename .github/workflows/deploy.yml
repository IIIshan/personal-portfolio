name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare SSH key
        shell: bash
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ssh_key
          chmod 600 ssh_key

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: ssh_key
          script: |
            set -e
            
            echo "=== Starting deployment ==="
            
            # Check if it's a git repository (has .git folder)
            if [ -d ~/Personal_Portfolio/.git ]; then
              echo "Git repo exists, pulling latest code..."
              cd ~/Personal_Portfolio
              git fetch origin main
              git reset --hard origin/main
            else
              echo "No git repo, cloning fresh..."
              rm -rf ~/Personal_Portfolio
              mkdir -p ~/Personal_Portfolio
              cd ~/Personal_Portfolio
              git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} .
            fi
            
            echo "=== Building Docker image ==="
            docker build -t portfolio-web:latest .
            
            echo "=== Stopping old container ==="
            docker stop portfolio-web 2>/dev/null || echo "No existing container to stop"
            docker rm portfolio-web 2>/dev/null || echo "No existing container to remove"
            
            echo "=== Removing old volumes (fixes permission issue) ==="
            docker volume rm caddy_data caddy_config 2>/dev/null || echo "No existing volumes to remove"
            
            echo "=== Starting new container ==="
            docker run -d \
              --name portfolio-web \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              -v caddy_data:/data \
              -v caddy_config:/config \
              portfolio-web:latest
            
            echo "=== Cleaning up ==="
            docker image prune -f || true
            
            echo "=== Deployment complete! ==="
            
            echo "=== Checking container status ==="
            docker ps -a
            
            echo "=== Checking container logs ==="
            docker logs portfolio-web --tail 30 || echo "No logs available"
            
            echo "=== Starting container if stopped ==="
            docker start portfolio-web || echo "Container already running or failed to start"
            
            echo "=== Verifying container is running ==="
            docker ps | grep portfolio-web || echo "Container not running"
            
            echo "=== Checking if port is listening ==="
            docker exec portfolio-web sh -c "netstat -tlnp 2>/dev/null || ss -tlnp" || echo "Port check failed"
            
            echo "=== Verifying deployment ==="
            sleep 5
            docker ps -a
            docker logs portfolio-web --tail 20 || echo "No logs available"
            
            echo "=== Testing port connectivity ==="
            docker exec portfolio-web curl -s -o /dev/null -w "%{http_code}" http://localhost/ || echo "Container internal check failed"
