name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare SSH key
        shell: bash
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ssh_key
          chmod 600 ssh_key

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: ssh_key
          debug: true
          script: |
            set -e
            
            echo "=== Starting deployment ==="
            
            # Check if directory exists
            if [ -d ~/Personal_Portfolio ]; then
              echo "Directory exists, pulling latest code..."
              cd ~/Personal_Portfolio
              git fetch origin main
              git reset --hard origin/main
            else
              echo "Directory doesn't exist, cloning repo..."
              mkdir -p ~/Personal_Portfolio
              cd ~/Personal_Portfolio
              git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} .
            fi
            
            echo "=== Building Docker image ==="
            docker build -t portfolio-web:latest .
            
            echo "=== Stopping old container ==="
            docker stop portfolio-web 2>/dev/null || echo "No existing container to stop"
            docker rm portfolio-web 2>/dev/null || echo "No existing container to remove"
            
            echo "=== Starting new container ==="
            docker run -d \
              --name portfolio-web \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              -v caddy_data:/data \
              -v caddy_config:/config \
              portfolio-web:latest
            
            echo "=== Cleaning up ==="
            docker image prune -f || true
            
            echo "=== Deployment complete! ==="
