<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#000000"/>
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#00ff9f" stroke-width="2"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#111111" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main text -->
  <text x="600" y="280" font-family="monospace" font-size="72" font-weight="bold" fill="#00ff9f" text-anchor="middle">ISHAN // DEV OPS</text>
  
  <!-- Subtitle -->
  <text x="600" y="360" font-family="monospace" font-size="28" fill="#7a7a7a" text-anchor="middle">Cloud Infrastructure &amp; CI/CD</text>
  
  <!-- Decorative line -->
  <line x1="200" y1="400" x2="1000" y2="400" stroke="#00ff9f" stroke-width="2"/>
  
  <!-- Terminal prompt style -->
  <text x="600" y="480" font-family="monospace" font-size="20" fill="#404040" text-anchor="middle">$ whoami</text>
  <text x="600" y="520" font-family="monospace" font-size="24" fill="#00cfff" text-anchor="middle">ishan — DevOps Engineer @ Bengaluru</text>
</svg>
